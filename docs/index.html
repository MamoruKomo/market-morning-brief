<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Morning Brief</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <section class="topbar-market" aria-label="market-overview">
          <div class="topbar-left">
            <div class="topbar-title">マーケット概要</div>
            <div class="topbar-sub muted">最新ブリーフから表示（出せない項目は非表示）</div>
          </div>
          <div class="topbar-kpi js-kpi"></div>
        </section>

        <section class="topbar-quick" aria-label="quick-links">
          <div class="topbar-quick-head">
            <div class="topbar-left">
              <div class="topbar-title">クイックリンク</div>
              <div class="topbar-sub muted">このブラウザ内で編集（localStorage）</div>
            </div>
            <div class="ql-actions">
              <button class="go js-ql-edit" type="button">編集</button>
              <button class="go js-ql-save" type="button" style="display:none">保存</button>
              <button class="go js-ql-cancel" type="button" style="display:none">キャンセル</button>
              <button class="go js-ql-reset" type="button" style="display:none">リセット</button>
            </div>
          </div>
          <div class="js-quicklinks"></div>
        </section>
      </div>
    </div>

    <div class="wrap">
      <header>
        <h1>Market Morning Brief（日本株・寄り前）</h1>
        <div class="meta">毎朝8:30（JST）にSlackへ「サマリー + 本文リンク」を配信します。</div>
        <form class="gsearch" action="search.html" method="get">
          <input class="js-gsearch" type="search" name="q" placeholder="材料 / 銘柄コード / タグで検索（例: 9983, 円安, 決算）" />
        </form>
        <div class="meta-line">
          <span class="js-stats-brief">最新ブリーフ: —</span> · <span class="js-stats-tdnet">適時開示更新: —</span>
        </div>
        <nav>
          <a href="index.html" aria-current="page">最新</a>
          <a href="archive/index.html">アーカイブ</a>
          <a href="search.html">検索</a>
          <a href="fundamentals/index.html">ファンダ</a>
          <a href="watchlist/index.html">ウォッチ</a>
          <a href="stocks/index.html">銘柄</a>
          <a href="tags/index.html">タグ</a>
          <a href="tdnet/index.html">適時開示</a>
          <a href="my/index.html">マイ</a>
          <a href="review/index.html">振り返り</a>
        </nav>

      </header>

      <main>
        <div class="dash-grid">
          <div class="maincol">
            <section id="watch" class="wide watch-hero">
              <h2>ウォッチリスト（今日）</h2>
              <div class="js-watchlist-mini"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="watchlist/index.html">一覧へ</a>
              </div>
            </section>

            <section id="today">
              <h2>今日の寄り前ブリーフ</h2>
              <div class="js-today"></div>
            </section>

            <section id="recent" class="wide">
              <h2>最近のブリーフ</h2>
              <div class="js-recent"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="archive/index.html">アーカイブへ</a>
              </div>
            </section>

          </div>

          <div class="sidecol">
            <section id="tdnet">
              <h2>適時開示（新着）</h2>
              <div class="js-tdnet-mini"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="tdnet/index.html">ログへ</a>
              </div>
            </section>

            <section id="tags">
              <h2>人気テーマ（過去ログ）</h2>
              <div class="js-tag-trends"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="tags/index.html">タグ一覧</a>
              </div>
            </section>
          </div>
        </div>
      </main>

      <footer>自動生成</footer>
    </div>
    <script src="assets/home.js"></script>
  </body>
</html>
