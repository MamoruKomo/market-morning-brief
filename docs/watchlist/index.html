<!doctype html>
<html lang="ja" data-watchlist-config="../data/watchlist.json" data-watchlist-snapshots="../data/watchlist_snapshots.json">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Morning Brief - Watchlist</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>ウォッチリスト（業界別）</h1>
        <div class="meta">寄り（09:30）/ 引け後（16:00）のスナップショットを蓄積し、銘柄と業界を横断して見ます。</div>
        <form class="gsearch" action="../search.html" method="get">
          <input type="search" name="q" placeholder="材料 / 銘柄コード / タグで検索（例: 9983, 円安, 決算）" />
        </form>
        <nav>
          <a href="../index.html">最新</a>
          <a href="../archive/index.html">アーカイブ</a>
          <a href="../search.html">検索</a>
          <a href="../watchlist/index.html" aria-current="page">ウォッチ</a>
          <a href="../stocks/index.html">銘柄</a>
          <a href="../tags/index.html">タグ</a>
          <a href="../tdnet/index.html">適時開示</a>
        </nav>
      </header>

      <main>
        <section>
          <h2>スナップショット</h2>
          <div class="controls">
            <label class="toggle">
              日付
              <select class="select js-date"></select>
            </label>
            <label class="toggle">
              <input class="js-toggle-en" type="checkbox" />
              英名も表示
            </label>
            <div class="muted js-status"></div>
          </div>
          <div class="muted js-error"></div>
          <div class="js-watchlist" style="margin-top:12px"></div>
        </section>

        <section>
          <h2>編集</h2>
          <ul>
            <li>
              ウォッチ銘柄は <code>docs/data/watchlist.json</code> を編集して追加できます（業界ごとにグループ化）。
            </li>
            <li>スナップショットは GitHub Actions が自動で <code>docs/data/watchlist_snapshots.json</code> に蓄積します。</li>
          </ul>
        </section>
      </main>

      <footer>Generated by automation.</footer>
    </div>
    <script src="../assets/watchlist.js"></script>
  </body>
</html>
