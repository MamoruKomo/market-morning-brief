<!doctype html>
<html lang="ja" data-tdnet-json="../data/tdnet.json">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寄り前ブリーフ - 適時開示</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="brand">
            <div class="brand-title"><a href="../index.html">寄り前ブリーフ</a></div>
            <div class="brand-sub">適時開示ログ</div>
          </div>

          <form class="sidebar-search" action="../search.html" method="get">
            <input type="search" name="q" placeholder="材料 / コード / タグ（例: 9983, 円安, 決算）" />
          </form>

          <nav class="sidebar-nav" aria-label="navigation">
            <div class="nav-group">
              <div class="nav-label">ダッシュボード</div>
              <a class="nav-link" href="../index.html">ホーム</a>
              <a class="nav-link" href="../watchlist/index.html">ウォッチ</a>
              <a class="nav-link" href="../fundamentals/index.html">探す（ファンダ）</a>
              <a class="nav-link" href="../tdnet/index.html" aria-current="page">適時開示</a>
            </div>
            <div class="nav-group">
              <div class="nav-label">ログ</div>
              <a class="nav-link" href="../archive/index.html">ブリーフ</a>
              <a class="nav-link" href="../search.html">検索</a>
              <a class="nav-link" href="../review/index.html">振り返り</a>
            </div>
            <div class="nav-group">
              <div class="nav-label">設定</div>
              <a class="nav-link" href="../watchlist/manage.html">ウォッチ編集</a>
            </div>
          </nav>

          <div class="sidebar-foot">PDFは公式TDnet（日本語）を優先して表示します。</div>
        </div>
      </aside>

      <div class="app-main">
        <div class="app-main-inner">
          <header class="page-head">
            <div>
              <h1 class="page-title">適時開示</h1>
              <div class="page-meta">
                新着の適時開示を蓄積し、日本語の要点つきで一覧・検索できます。<span class="js-last-checked"></span>
              </div>
            </div>
            <div class="page-actions">
              <a class="go" href="https://kabutan.jp/disclosures/" target="_blank" rel="noreferrer">株探の開示一覧</a>
              <a class="go" href="https://www.release.tdnet.info/inbs/I_main_00.html" target="_blank" rel="noreferrer">TDnet公式</a>
            </div>
          </header>

          <main class="page">
            <section>
              <h2>適時開示</h2>
              <div class="controls">
                <input class="js-search" type="search" placeholder="銘柄コード / 会社名 / キーワード（例: 7545, 自己株, 増資）" />
                <label class="toggle">
                  <input class="js-toggle-en" type="checkbox" />
                  原文（英）も表示
                </label>
                <div class="muted js-count"></div>
              </div>
              <div class="filters js-filters" aria-label="filters"></div>
              <div class="muted js-error"></div>
              <div class="js-tdnet-list" style="margin-top:12px"></div>
              <div class="controls" style="margin-top:12px">
                <button class="go js-more" type="button" style="display:none">もっと見る</button>
              </div>
            </section>
          </main>

          <footer>自動生成</footer>
        </div>
      </div>
    </div>
    <script src="../assets/tdnet.js"></script>
  </body>
</html>
