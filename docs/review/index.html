<!doctype html>
<html
  lang="ja"
  data-briefs-json="../data/briefs.json"
  data-tdnet-json="../data/tdnet.json"
  data-watchlist-config="../data/watchlist.json"
  data-watchlist-snapshots="../data/watchlist_snapshots.json"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Morning Brief - Review</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>振り返り</h1>
        <div class="meta">ブリーフ / ウォッチ / 適時開示を日別にまとめて、メモを残します（ブラウザ保存）。</div>
        <form class="gsearch" action="../search.html" method="get">
          <input type="search" name="q" placeholder="材料 / 銘柄コード / タグで検索（例: 9983, 円安, 決算）" />
        </form>
        <nav>
          <a href="../index.html">最新</a>
          <a href="../archive/index.html">アーカイブ</a>
          <a href="../search.html">検索</a>
          <a href="../fundamentals/index.html">ファンダ</a>
          <a href="../watchlist/index.html">ウォッチ</a>
          <a href="../stocks/index.html">銘柄</a>
          <a href="../tags/index.html">タグ</a>
          <a href="../tdnet/index.html">適時開示</a>
          <a href="../my/index.html">My</a>
          <a href="../review/index.html" aria-current="page">振り返り</a>
        </nav>
        <div class="controls" style="margin-top:12px">
          <label class="toggle">
            日付
            <select class="select js-date"></select>
          </label>
          <div class="muted js-status"></div>
        </div>
      </header>

      <main>
        <div class="dash-grid">
          <div class="maincol">
            <section>
              <h2>ブリーフ（本文リンク）</h2>
              <div class="js-brief"></div>
            </section>

            <section>
              <h2>ウォッチ（寄り/引け）</h2>
              <div class="js-watch"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="../watchlist/index.html">ウォッチ一覧へ</a>
              </div>
            </section>

            <section class="wide">
              <h2>メモ</h2>
              <div class="controls">
                <button class="go js-memo-copy" type="button">コピー</button>
                <button class="go js-memo-clear" type="button">クリア</button>
                <div class="muted js-memo-status"></div>
              </div>
              <textarea class="js-memo" rows="10" placeholder="その日の振り返り（良かった/悪かった/次の改善）" style="margin-top:10px"></textarea>
            </section>
          </div>

          <div class="sidecol">
            <section>
              <h2>適時開示（その日）</h2>
              <div class="js-tdnet"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="../tdnet/index.html">全件ログへ</a>
              </div>
            </section>
          </div>
        </div>
      </main>

      <footer>Generated by automation.</footer>
    </div>
    <script src="../assets/review.js"></script>
  </body>
</html>
