<!doctype html>
<html
  lang="ja"
  data-briefs-json="../data/briefs.json"
  data-tdnet-json="../data/tdnet.json"
  data-watchlist-config="../data/watchlist.json"
  data-watchlist-snapshots="../data/watchlist_snapshots.json"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寄り前ブリーフ - 振り返り</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="brand">
            <div class="brand-title"><a href="../index.html">寄り前ブリーフ</a></div>
            <div class="brand-sub">振り返り</div>
          </div>

          <form class="sidebar-search" action="../search.html" method="get">
            <input type="search" name="q" placeholder="材料 / コード / タグ（例: 9983, 円安, 決算）" />
          </form>

          <nav class="sidebar-nav" aria-label="navigation">
            <div class="nav-group">
              <div class="nav-label">ページ</div>
              <a class="nav-link" href="../index.html">ホーム</a>
              <a class="nav-link" href="../watchlist/index.html">ウォッチリスト</a>
              <a class="nav-link" href="../tdnet/index.html">適時開示</a>
              <a class="nav-link" href="../fundamentals/index.html">ファンダ</a>
              <a class="nav-link" href="../archive/index.html">アーカイブ</a>
              <a class="nav-link" href="../stocks/index.html">銘柄</a>
              <a class="nav-link" href="../tags/index.html">タグ</a>
              <a class="nav-link" href="../my/index.html">マイ</a>
              <a class="nav-link" href="../review/index.html" aria-current="page">振り返り</a>
            </div>
            <div class="nav-group">
              <div class="nav-label">目次</div>
              <a class="nav-link" href="#brief">ブリーフ</a>
              <a class="nav-link" href="#watch">ウォッチ</a>
              <a class="nav-link" href="#tdnet">適時開示</a>
              <a class="nav-link" href="#memo">メモ</a>
            </div>
          </nav>

          <div class="sidebar-foot">日別にまとめて、1メモで振り返り。</div>
        </div>
      </aside>

      <div class="app-main">
        <div class="app-main-inner">
          <header class="page-head">
            <div>
              <h1 class="page-title">振り返り</h1>
              <div class="page-meta">ブリーフ / ウォッチ / 適時開示を日別にまとめ、メモを残します（ブラウザ保存）。</div>
            </div>
            <div class="page-actions">
              <label class="toggle">
                日付
                <select class="select js-date"></select>
              </label>
              <div class="muted js-status"></div>
            </div>
          </header>

          <main class="page">
            <div class="dash-grid">
              <div class="maincol">
                <section id="brief">
                  <h2>ブリーフ（本文リンク）</h2>
                  <div class="js-brief"></div>
                </section>

                <section id="watch">
                  <h2>ウォッチ（寄り/引け）</h2>
                  <div class="js-watch"></div>
                  <div class="controls" style="margin-top:12px">
                    <a class="go" href="../watchlist/index.html">ウォッチ一覧へ</a>
                  </div>
                </section>

                <section id="memo" class="wide">
                  <h2>メモ</h2>
                  <div class="controls">
                    <button class="go js-memo-copy" type="button">コピー</button>
                    <button class="go js-memo-clear" type="button">クリア</button>
                    <div class="muted js-memo-status"></div>
                  </div>
                  <textarea class="js-memo" rows="10" placeholder="その日の振り返り（良かった/悪かった/次の改善）" style="margin-top:10px"></textarea>
                </section>
              </div>

              <div class="sidecol">
                <section id="tdnet">
                  <h2>適時開示（その日）</h2>
                  <div class="js-tdnet"></div>
                  <div class="controls" style="margin-top:12px">
                    <a class="go" href="../tdnet/index.html">全件ログへ</a>
                  </div>
                </section>
              </div>
            </div>
          </main>

          <footer>自動生成</footer>
        </div>
      </div>
    </div>
    <script src="../assets/review.js"></script>
  </body>
</html>
