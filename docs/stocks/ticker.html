<!doctype html>
<html lang="ja" data-page-mode="ticker" data-briefs-json="../data/briefs.json" data-base-href="../">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寄り前ブリーフ - 銘柄</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="brand">
            <div class="brand-title"><a href="../index.html">寄り前ブリーフ</a></div>
            <div class="brand-sub">銘柄ログ（詳細）</div>
          </div>

          <form class="sidebar-search" action="../search.html" method="get">
            <input type="search" name="q" placeholder="材料 / コード / タグ（例: 9983, 円安, 決算）" />
          </form>

          <nav class="sidebar-nav" aria-label="navigation">
            <div class="nav-group">
              <div class="nav-label">ページ</div>
              <a class="nav-link" href="../index.html">ホーム</a>
              <a class="nav-link" href="../watchlist/index.html">ウォッチリスト</a>
              <a class="nav-link" href="../tdnet/index.html">適時開示</a>
              <a class="nav-link" href="../fundamentals/index.html">ファンダ</a>
              <a class="nav-link" href="../archive/index.html">アーカイブ</a>
              <a class="nav-link" href="../stocks/index.html" aria-current="page">銘柄</a>
              <a class="nav-link" href="../tags/index.html">タグ</a>
              <a class="nav-link" href="../my/index.html">マイ</a>
              <a class="nav-link" href="../review/index.html">振り返り</a>
            </div>
          </nav>

          <div class="sidebar-foot">銘柄ページは、出現したブリーフへ最短で戻れます。</div>
        </div>
      </aside>

      <div class="app-main">
        <div class="app-main-inner">
          <header class="page-head">
            <div>
              <h1 class="page-title js-ticker-title">銘柄</h1>
              <div class="page-meta">この銘柄が登場した日別ブリーフへのリンク集です。</div>
            </div>
            <div class="page-actions">
              <a href="https://kabutan.jp/stock/?code=" class="go js-kabutan" target="_blank" rel="noreferrer">株探へ</a>
            </div>
          </header>

          <main class="page">
            <section>
              <h2>ログ</h2>
              <div class="muted js-error"></div>
              <div class="js-ticker-detail" style="margin-top:12px"></div>
            </section>
          </main>

          <footer>自動生成</footer>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const code = (params.get("code") || "").trim();
        const a = document.querySelector("a.js-kabutan");
        if (a && code) a.href = `https://kabutan.jp/stock/?code=${encodeURIComponent(code)}`;
      })();
    </script>
    <script src="../assets/site.js"></script>
  </body>
</html>
