<!doctype html>
<html lang="ja" data-page-mode="ticker" data-briefs-json="../data/briefs.json" data-base-href="../">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title class="js-ticker-title">Ticker</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1 class="js-ticker-title">Ticker</h1>
        <div class="meta">この銘柄が登場した日別ブリーフへのリンク集です。</div>
        <form class="gsearch" action="../search.html" method="get">
          <input type="search" name="q" placeholder="材料 / 銘柄コード / タグで検索（例: 9983, 円安, 決算）" />
        </form>
        <nav>
          <a href="../index.html">最新</a>
          <a href="../archive/index.html">アーカイブ</a>
          <a href="../search.html">検索</a>
          <a href="../fundamentals/index.html">ファンダ</a>
          <a href="../watchlist/index.html">ウォッチ</a>
          <a href="../stocks/index.html" aria-current="page">銘柄</a>
          <a href="../tags/index.html">タグ</a>
          <a href="../tdnet/index.html">適時開示</a>
          <a href="https://kabutan.jp/stock/?code=" class="js-kabutan" target="_blank" rel="noreferrer">株探（外部）</a>
        </nav>
      </header>

      <main>
        <section>
          <h2>ログ</h2>
          <div class="muted js-error"></div>
          <div class="js-ticker-detail" style="margin-top:12px"></div>
        </section>
      </main>

      <footer>Generated by automation.</footer>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const code = (params.get("code") || "").trim();
        const a = document.querySelector("a.js-kabutan");
        if (a && code) a.href = `https://kabutan.jp/stock/?code=${encodeURIComponent(code)}`;
      })();
    </script>
    <script src="../assets/site.js"></script>
  </body>
</html>
