<!doctype html>
<html lang="ja" data-rankings-json="../data/fundamentals_rankings.json" data-hidden-json="../data/hidden_gems.json">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寄り前ブリーフ - ファンダ</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="brand">
            <div class="brand-title"><a href="../index.html">寄り前ブリーフ</a></div>
            <div class="brand-sub">ファンダ（寄り前チェック）</div>
          </div>

          <form class="sidebar-search" action="../search.html" method="get">
            <input type="search" name="q" placeholder="材料 / コード / タグ（例: 9983, 円安, 決算）" />
          </form>

          <nav class="sidebar-nav" aria-label="navigation">
            <div class="nav-group">
              <div class="nav-label">ダッシュボード</div>
              <a class="nav-link" href="../index.html">ホーム</a>
              <a class="nav-link" href="../watchlist/index.html">ウォッチ</a>
              <a class="nav-link" href="../fundamentals/index.html" aria-current="page">探す（ファンダ）</a>
              <a class="nav-link" href="../tdnet/index.html">適時開示</a>
            </div>
            <div class="nav-group">
              <div class="nav-label">ログ</div>
              <a class="nav-link" href="../archive/index.html">ブリーフ</a>
              <a class="nav-link" href="../search.html">検索</a>
              <a class="nav-link" href="../review/index.html">振り返り</a>
            </div>
            <div class="nav-group">
              <div class="nav-label">設定</div>
              <a class="nav-link" href="../watchlist/manage.html">ウォッチ編集</a>
            </div>
          </nav>

          <div class="sidebar-foot">「危険な財務」「極端なバリュエーション」を即確認。</div>
        </div>
      </aside>

      <div class="app-main">
        <div class="app-main-inner">
          <header class="page-head">
            <div>
              <h1 class="page-title">ファンダ</h1>
              <div class="page-meta">デイトレでも寄り前に「危険な財務」「極端なバリュエーション」を即チェック。</div>
            </div>
          </header>

          <main class="page">
            <div class="fund-grid">
              <section class="fund-rank">
                <h2>ランキング（上位5）</h2>
                <div class="controls">
                  <label class="toggle">
                    月
                    <select class="select js-month"></select>
                  </label>
                  <div class="muted js-status"></div>
                </div>
                <div class="muted js-error"></div>
                <div class="metric-grid js-metric-grid" style="margin-top:12px"></div>
              </section>

              <div class="fund-side">
                <section class="fund-hidden">
                  <h2>今日の隠れ銘柄（ランダム）</h2>
                  <div class="meta-line">指標×指標の組み合わせで上位5を毎朝更新。</div>
                  <div class="js-hidden" style="margin-top:12px"></div>
                </section>

                <section class="fund-api">
                  <details class="fund-details">
                    <summary>EDINET DB APIキー（任意）</summary>
                    <div class="meta-line" style="margin-top:8px">
                      キーはブラウザ保存（localStorage）で、リポジトリには保存しません。
                    </div>
                    <div class="controls" style="margin-top:10px">
                      <input class="js-api-key" type="password" placeholder="X-API-Key（Free: 100/day）" style="width:min(520px,100%)" />
                      <button class="go js-save-key" type="button">保存</button>
                      <button class="go js-clear-key" type="button">クリア</button>
                      <div class="muted js-key-status"></div>
                    </div>
                  </details>
                </section>
              </div>
            </div>
          </main>

          <footer>自動生成</footer>
        </div>
      </div>
    </div>
    <script src="../assets/edinetdb.js"></script>
    <script src="../assets/fundamentals.js"></script>
  </body>
</html>
