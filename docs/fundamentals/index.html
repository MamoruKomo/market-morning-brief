<!doctype html>
<html lang="ja" data-rankings-json="../data/fundamentals_rankings.json" data-hidden-json="../data/hidden_gems.json">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Morning Brief - Fundamentals</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>ファンダ（ランキング / 隠れ銘柄）</h1>
        <div class="meta">デイトレでも「危険な財務」「極端なバリュエーション」を寄り前に即チェック。</div>
        <form class="gsearch" action="../search.html" method="get">
          <input type="search" name="q" placeholder="材料 / 銘柄コード / タグで検索（例: 9983, 円安, 決算）" />
        </form>
        <nav>
          <a href="../index.html">最新</a>
          <a href="../archive/index.html">アーカイブ</a>
          <a href="../search.html">検索</a>
          <a href="../fundamentals/index.html" aria-current="page">ファンダ</a>
          <a href="../watchlist/index.html">ウォッチ</a>
          <a href="../stocks/index.html">銘柄</a>
          <a href="../tags/index.html">タグ</a>
          <a href="../tdnet/index.html">適時開示</a>
          <a href="../my/index.html">My</a>
          <a href="../review/index.html">振り返り</a>
        </nav>
      </header>

      <main>
        <div class="fund-grid">
          <section class="fund-rank">
            <h2>ランキング（Top5）</h2>
            <div class="controls">
              <label class="toggle">
                月
                <select class="select js-month"></select>
              </label>
              <div class="muted js-status"></div>
            </div>
            <div class="muted js-error"></div>
            <div class="metric-grid js-metric-grid" style="margin-top:12px"></div>
          </section>

          <div class="fund-side">
            <section class="fund-hidden">
              <h2>今日の隠れ銘柄（ランダム）</h2>
              <div class="meta-line">指標×指標の組み合わせでTop5を毎朝更新。</div>
              <div class="js-hidden" style="margin-top:12px"></div>
            </section>

            <section class="fund-api">
              <details class="fund-details">
                <summary>EDINET DB APIキー（任意）</summary>
                <div class="meta-line" style="margin-top:8px">
                  キーはブラウザ保存（localStorage）で、リポジトリには保存しません。
                </div>
                <div class="controls" style="margin-top:10px">
                  <input class="js-api-key" type="password" placeholder="X-API-Key（Free: 100/day）" style="width:min(520px,100%)" />
                  <button class="go js-save-key" type="button">保存</button>
                  <button class="go js-clear-key" type="button">クリア</button>
                  <div class="muted js-key-status"></div>
                </div>
              </details>
            </section>
          </div>
        </div>
      </main>

      <footer>Generated by automation.</footer>
    </div>
    <script src="../assets/edinetdb.js"></script>
    <script src="../assets/fundamentals.js"></script>
