<!doctype html>
<html
  lang="ja"
  data-briefs-json="../data/briefs.json"
  data-tdnet-json="../data/tdnet.json"
  data-watchlist-config="../data/watchlist.json"
  data-watchlist-snapshots="../data/watchlist_snapshots.json"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Morning Brief - My</title>
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>My ダッシュボード</h1>
        <div class="meta">ブラウザ保存（localStorage）で「メモ/クイックリンク/マイウォッチ」を管理できます。</div>
        <form class="gsearch" action="../search.html" method="get">
          <input type="search" name="q" placeholder="材料 / 銘柄コード / タグで検索（例: 9983, 円安, 決算）" />
        </form>
        <nav>
          <a href="../index.html">最新</a>
          <a href="../archive/index.html">アーカイブ</a>
          <a href="../search.html">検索</a>
          <a href="../fundamentals/index.html">ファンダ</a>
          <a href="../watchlist/index.html">ウォッチ</a>
          <a href="../stocks/index.html">銘柄</a>
          <a href="../tags/index.html">タグ</a>
          <a href="../tdnet/index.html">適時開示</a>
          <a href="../my/index.html" aria-current="page">My</a>
          <a href="../review/index.html">振り返り</a>
        </nav>
        <div class="controls" style="margin-top:12px">
          <a class="go" href="../watchlist/manage.html">マイウォッチ編集</a>
          <a class="go" href="../review/index.html">振り返り</a>
        </div>
      </header>

      <main>
        <div class="dash-grid">
          <div class="maincol">
            <section class="wide watch-hero">
              <h2>ウォッチリスト（共有・最新）</h2>
              <div class="js-watchlist-mini"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="../watchlist/index.html">一覧へ</a>
              </div>
            </section>

            <section class="wide">
              <h2>異常検知（出来高 / ギャップ）</h2>
              <div class="js-alerts"></div>
              <div class="meta-line muted">条件は暫定です（ウォッチ銘柄のみ）。</div>
            </section>

            <section>
              <h2>今日の寄り前ブリーフ</h2>
              <div class="js-today"></div>
            </section>

            <section class="wide">
              <h2>メモ（今日）</h2>
              <div class="controls">
                <button class="go js-memo-copy" type="button">コピー</button>
                <button class="go js-memo-clear" type="button">クリア</button>
                <div class="muted js-memo-status"></div>
              </div>
              <textarea
                class="js-memo"
                rows="8"
                placeholder="今日の作戦 / 反省 / 明日やること…（ブラウザ保存）"
                style="margin-top:10px"
              ></textarea>
            </section>
          </div>

          <div class="sidecol">
            <section>
              <h2>マイウォッチ（ブラウザ保存）</h2>
              <div class="controls">
                <input class="js-my-search" type="search" placeholder="コード/銘柄で絞り込み（例: 8035, トヨタ）" />
                <div class="muted js-my-status"></div>
              </div>
              <div class="muted js-my-error"></div>
              <div class="js-my-watch" style="margin-top:12px"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="../watchlist/manage.html">編集へ</a>
              </div>
            </section>

            <section>
              <h2>適時開示（新着）</h2>
              <div class="js-tdnet-mini"></div>
              <div class="controls" style="margin-top:12px">
                <a class="go" href="../tdnet/index.html">ログへ</a>
              </div>
            </section>

            <section>
              <h2>クイックリンク（My）</h2>
              <div class="js-links"></div>
              <div class="controls" style="margin-top:10px">
                <input class="js-link-label" type="search" placeholder="ラベル（例: PTS出来高）" />
                <input class="js-link-url" type="search" placeholder="URL" />
                <button class="go js-link-add" type="button">追加</button>
                <button class="go js-link-reset" type="button">初期化</button>
              </div>
              <div class="muted js-links-status" style="margin-top:8px"></div>
            </section>
          </div>
        </div>
      </main>

      <footer>Generated by automation.</footer>
    </div>
    <script src="../assets/my.js"></script>
  </body>
</html>
