name: Rollcall reaction

on:
  schedule:
    # 21:01 JST (12:01 UTC)
    - cron: "1 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rollcall-reaction
  cancel-in-progress: false

jobs:
  react:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: React to rollcall message
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_CHANNEL_ID: C0AFD5SKDG9
          LOOKBACK_MINUTES: "30"
        run: |
          python3 scripts/slack_rollcall_react.py \
            --require-text "21:00になりました" \
            --require-text ":loudspeaker:"
